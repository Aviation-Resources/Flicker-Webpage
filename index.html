<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="images/logo-46419724.png" />
  <link rel="apple-touch-icon" href="images/logo-46419724.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flicker</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="banner">
    <a href="/" class="logo-link">
      <img class="logo" src="images/logo-46419724.png" alt="Flicker Logo" />
    </a>
    <div class="site-name">Flicker</div>
    <div class="spacer"></div>
    <nav class="nav-links">
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-menu">
        <a href="pages/support.html">Support</a>
        <a href="pages/privacy-policy.html">Privacy Policy</a>
      </div>
    </nav>
  </header>

  <main class="content">
    <section class="hero">
      <h1>Built for <span id="rotating-headline" class="pill pill-rotating">Entrepreneurs</span></h1>
      <script>
        const words = ["Dreamers", "Doers", "Entrepreneurs", "Solopreneurs", "Visionaries", "Disruptors", "Rebels"];
        const el = document.getElementById("rotating-headline");
        let idx = 0;
        setInterval(() => {
          el.style.opacity = 0;
          setTimeout(() => {
            idx = (idx + 1) % words.length;
            el.textContent = words[idx];
            el.style.opacity = 1;
          }, 350);
        }, 2000);
      </script>
      <p id="hero-copy"></p>

      <script>
        const copies = [
          `Stop building things nobody wants.<br>Validate your idea before you write a single line of code.<br>Know your customer. Test your thesis. Launch to a crowd, not crickets.`,
          `Most ideas die because nobody tested them.<br>Get ruthlessly clear on your customer, their pains, and your solution. Then put it in front of real people before you build.`,
          `Your idea is a hypothesis. Prove it first.<br>Identify your customer. Define their pains. Test your solution.<br>Launch to waiting customers — not crickets.`
        ];
        document.getElementById("hero-copy").innerHTML = copies[Math.floor(Math.random() * copies.length)];
      </script>
      <a href="https://apps.apple.com/us/app/flicker/id6760236493" class="btn-appstore">
        <img src="images/Download_on_the_App_Store_Badge_US-UK_RGB_wht_092917.svg" alt="Download on the App Store" />
      </a>
    </section>
    <section class="section" id="screenshots">
        <h2 class="screenshots-heading">See It In Action</h2>
        <div class="carousel-track-wrapper">
          <div class="carousel-track">
            <div class="screenshot-card">
              <img src="images/Screenshots/Phone.png" alt="App screenshot 1" />
            </div>
            <div class="screenshot-card">
              <img src="images/Screenshots/Phone-1.png" alt="App screenshot 2" />
            </div>
            <div class="screenshot-card">
              <img src="images/Screenshots/Phone-2.png" alt="App screenshot 3" />
            </div>
            <div class="screenshot-card">
              <img src="images/Screenshots/Phone-3.png" alt="App screenshot 5" />
            </div>
          </div>
        </div>
      </section>
  </main>
  <script>
    const toggle = document.querySelector('.nav-toggle');
    const menu = document.querySelector('.nav-menu');
    toggle.addEventListener('click', () => {
      menu.classList.toggle('nav-menu--open');
      toggle.classList.toggle('nav-toggle--open');
    });
  </script>
</body>
</html>
